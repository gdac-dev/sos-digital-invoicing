version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sos_digital
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/sos_digital
      JWT_SECRET: change_this_secret_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      CLIENT_URL: http://localhost:5173
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your@gmail.com
      SMTP_PASS: your_app_password
      FROM_EMAIL: "SOS DIGITAL <noreply@sosdigital.cm>"
      ADMIN_EMAIL: admin@sosdigital.cm
      ADMIN_PASSWORD: Admin@SOS2024
      ADMIN_NAME: "Administrateur SOS"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  postgres_data:
