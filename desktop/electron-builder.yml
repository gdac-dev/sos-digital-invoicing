appId: com.sosdigital.invoicing
productName: SOS DIGITAL
directories:
  output: dist
  buildResources: build
files:
  - "src/**/*"
  - "package.json"
extraResources:
  - from: "../client/dist"
    to: "client/dist"
  - from: "../server"
    to: "server"
    filter:
      - "**/*"
      - "!node_modules/.cache"
      - "!node_modules/**/*.md"
      - "!node_modules/**/*.d.ts"
win:
  target: nsis
  icon: build/icon.ico
mac:
  target: dmg
  icon: build/icon.png
linux:
  target: AppImage
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "SOS DIGITAL"
